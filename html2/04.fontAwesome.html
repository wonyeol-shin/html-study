<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      i {
        display: inline-flex;
        justify-content: center;
        align-items: center;

        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: burlywood;
      }
    </style>
  </head>
  <body>
    <!-- 
    이모티콘 만드는 라이브러리 fontAwesome 
    설치는 cdn(fontawsome 5 cdnjss 검색 후 css 경로 복사) 혹은 직접 설치
     -->

    <!-- 원하는 아이콘 fontawesome  웹에서 찾아서 복사하기
font-size 로 크기를 키워도 되는데 fa-Nx 로 N배 만큼 크기를 늘릴 수 있음       
     -->
    <div>
      <i class="fa-chisel fa-regular fa-alarm-clock fa-4x"></i>
    </div>
    <div>
      <i class="fa-chisel fa-regular fa-anchor fa-2x"></i>
    </div>
  </body>
</html>
