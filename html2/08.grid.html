<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/08.grid.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- 부트스트랩을 통해서 반응형 레이아웃을 만들 때 매우 편리하다. -->
    <div class="container">
      <!-- row와 col클래스는 균일하게 쪼개진 박스를 만들어 줌 -->
      <div class="row">
        <!-- 균일하게 하려면 col-N을 통해 줄 수 있음(최대 한 줄 12) -->
        <div class="col-3">안녕하세요1</div>
        <div class="col-3">안녕하세요2</div>
        <div class="col-3">안녕하세요3</div>
        <div class="col-3">안녕하세요4</div>
      </div>
      <div class="row">
        <!-- 특정 사이즈 이하에서는 모바일 형태로 보겠다.
        sm : 504px
        md 702px..
        등이 있고 부트스트랩 grid 겁색 
        -->
        <div class="col-md-8">안녕하세요5</div>
        <div class="col-md-4">안녕하세요6</div>
      </div>

      <div class="d-flex flex-nowrap">
        <div class="order-3 p-2">First flex item</div>
        <div class="order-2 p-2">Second flex item</div>
        <div class="order-1 p-2">Third flex item</div>
      </div>
    </div>
  </body>
</html>
