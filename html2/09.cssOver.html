<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/09.cssOver.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- 남이 짜놓은 css를 쉽게 덮어쓰기 하는 법(수정이 불가능 하거나 힒든 상황일 때) 
     
    1. 동일한 클래스명을 만들어 준다. (밑에 있는 클래스명이 먼저 적용 됨 미디어쿼리 처럼)
    혹은 다른 클래스파일에서 동일한 클래스명을 작성
    2.우선순위가 더 높은 id나 style을 직접 명시하거나 
    !important 를 붙여 우선순위를 설정한다. 
    (하지만 임시 조치일 뿐 계속해서 우선순위를 높일 수 없음)
    3.specificity 를 높인다.
    css는 구체적으로 지정하면 점수가 높아서 우선적으로 적용을 함
    ex class "test1" -> specifi .test2

    -->
    <div class="specifi">
      <p class="test1 test2">ddddddddddd</p>
    </div>
  </body>
</html>
