<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact US</title>
    <link rel="stylesheet" href="./css/06.homeWork.css" />
  </head>
  <body>
    <div class="container">
      <form action="">
        <h1 style="margin-left: 20px">contact US</h1>

        <div class="mainMail">
          <p style="margin-left: 20px">your Email</p>
          <input class="eMail" placeholder="email@example.com" type="email" />
        </div>

        <div class="firstName">
          <p>First Name</p>
          <input type="text" />
        </div>
        <div class="lastName">
          <p>Last Name</p>
          <input type="text" />
        </div>
        <div style="clear: both"></div>
        <div class="message">
          <p style="margin-left: 20px">Message</p>
          <textarea class="message-box" style="margin-left: 20px"> </textarea>
        </div>
        <div style="clear: both"></div>
        <div class="subscribeButton">
          <input type="checkbox" />
          <p class="subscribe">Subscribe</p>
        </div>

        <div class="submit">
          <input class="submit-button" value="SEND" type="submit" />
        </div>
      </form>
    </div>
  </body>
</html>
