<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title></title>
    <link rel="stylesheet" href="./css/06.form&input.css" />
  </head>
  <body>
    <!--
form 태그는 작성한 내용을 어떤 서버의 경로로 보낼지 설정하는 역할의 태그이다.
-->

    <form action="">
      <!-- value로  미리 값을 채울 수 있음
       placeholder 배경글자(추천글자, 회색으로 보임)
       name 으로 서버에서 어떤 input인지 구별할 수 있음     -->
      <input type="text" value="ddd" placeholder="ffff" />
      <input type="button" />

      <!--  드롭박스로 선택하여 전달도 가능-->
      <select>
        <option value="">a</option>
        <option value="">b</option>
        <option value="">c</option>
      </select>
      <!-- 많은 양을 전달할 때 사용가능    -->
      <textarea></textarea>

      <!-- 전송을 위한 목적 -->
      <input type="submit" />
      <button type="submit"></button>

      <br />

      <input type="text" class="test-input" />
    </form>
  </body>
</html>
